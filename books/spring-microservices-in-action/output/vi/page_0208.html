      <figure class="listing">
        <figcaption><strong>Listing 6.13</strong><br>Chèn correlation ID vào phản hồi HTTP</figcaption>
        <div class="listing-annotated listing-annotated--613" aria-label="Listing 6.13 mã có chú thích">
          <figure class="code-snippet">
            <pre class="code-block"><code>package com.thoughtmechanix.zuulsvr.filters;

//Remove imports for conciseness
@Component
public class ResponseFilter extends ZuulFilter{
  private static final int FILTER_ORDER=1;
  private static final boolean SHOULD_FILTER=true;
  private static final Logger logger =
  ➥ LoggerFactory
       .getLogger(ResponseFilter.class);

  @Autowired
  FilterUtils filterUtils;

  @Override
  public String filterType() {
    return FilterUtils.POST_FILTER_TYPE;
  }

  @Override
  public int filterOrder() {
    return FILTER_ORDER;
  }

  @Override
  public boolean shouldFilter() {
    return SHOULD_FILTER;
  }

  @Override
  public Object run() {
    RequestContext ctx =
        RequestContext.getCurrentContext();

        logger.debug("Adding the correlation id to
        ➥ the outbound headers. {}",
        ➥ filterUtils.getCorrelationId());
        ctx.getResponse()
          .addHeader(
             FilterUtils.CORRELATION_ID,
             filterUtils.getCorrelationId());

        logger.debug("Completing outgoing request for {}.",
        ➥ ctx.getRequest().getRequestURI());
        return null;
  }
}</code></pre>
          </figure>
          <div class="listing-callouts-right" aria-label="Listing 6.13 chú thích bên phải">
            <p class="listing-callout">Để xây dựng một post filter, bạn cần đặt kiểu filter thành POST_FILTER_TYPE.</p>
            <p class="listing-callout">Lấy correlation ID đã được truyền trong HTTP request ban đầu và chèn nó vào phản hồi.</p>
            <p class="listing-callout">Ghi log URI của yêu cầu đi ra để bạn có hai đầu mốc thể hiện điểm vào đến và đi ra của yêu cầu người dùng vào Zuul.</p>
