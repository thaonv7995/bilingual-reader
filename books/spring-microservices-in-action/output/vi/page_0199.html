          <div class="listing-callouts-right" aria-label="Listing 6.6 chú thích bên phải">
            <p class="listing-callout">Mọi filter Zuul phải kế thừa lớp ZuulFilter và ghi đè bốn phương thức: filterType(), filterOrder(), shouldFilter() và run().</p>
            <p class="listing-callout">Các hàm thường dùng trên mọi filter đã được đóng gói trong lớp FilterUtils.</p>
            <p class="listing-callout">Phương thức filterType() dùng để cho Zuul biết filter là pre-, route hay post filter.</p>
            <p class="listing-callout">Phương thức filterOrder() trả về giá trị số nguyên chỉ ra thứ tự Zuul nên đưa yêu cầu qua các loại filter khác nhau.</p>
            <p class="listing-callout">Phương thức shouldFilter() trả về Boolean cho biết filter có nên được kích hoạt hay không.</p>
            <p class="listing-callout">Phương thức run() là mã được thực thi mỗi khi một dịch vụ đi qua filter. Trong hàm run(), bạn kiểm tra xem tmx-correlation-id có xuất hiện hay không; nếu không, bạn tạo giá trị correlation và đặt HTTP header tmx-correlation-id</p>
