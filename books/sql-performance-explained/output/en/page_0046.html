      <p class="chapter-running-head">Chapter 2: The Where Clause</p>

      <p class="language-label">C#</p>

      <p class="snippet-caption">Without bind parameters:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code>int subsidiary_id;
SqlCommand cmd = new SqlCommand(
                   "select first_name, last_name"
                 + "  from employees"
                 + " where <strong>subsidiary_id = " + subsidiary_id</strong>
                 , connection);</code></pre>
      </figure>

      <p class="snippet-caption">Using a bind parameter:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code>int subsidiary_id;
SqlCommand cmd =
       new SqlCommand(
                      "select first_name, last_name"
                    + "  from employees"
                    + " where <strong>subsidiary_id = @subsidiary_id</strong>"
                    , connection);
<strong>cmd.Parameters.AddWithValue("@subsidiary_id", subsidiary_id);</strong></code></pre>
      </figure>

      <p class="see-also">See also: <code>SqlParameterCollection</code> class documentation.</p>

      <p class="language-label">Java</p>

      <p class="snippet-caption">Without bind parameters:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code>int subsidiary_id;
Statement command = connection.createStatement(
                    "select first_name, last_name"
                  + "  from employees"
                  + " where <strong>subsidiary_id = " + subsidiary_id</strong>
                  );</code></pre>
      </figure>

      <p class="snippet-caption">Using a bind parameter:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code><strong>int subsidiary_id;
PreparedStatement</strong> command = connection.<strong>prepareStatement</strong>(
                    "select first_name, last_name"
                  + "  from employees"
                  + " where <strong>subsidiary_id = ?"</strong>
                  );
<strong>command.setInt(1, subsidiary_id);</strong></code></pre>
      </figure>

      <p class="see-also">See also: <code>PreparedStatement</code> class documentation.</p>
