    <article class="sheet-flow prose-page">
      <p class="chapter-running-head">Chapter 4: The Join Operation</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>SELECT s0_.sale_id       AS sale_id0,
       s0_.sale_date     AS sale_date1,
       s0_.eur_value     AS eur_value2,
       e1_.employee_id   AS employee_id3,
       e1_.subsidiary_id AS subsidiary_id4,
       e1_.first_name    AS first_name5,
       e1_.last_name     AS last_name6,
       s0_.subsidiary_id AS subsidiary_id7,
       s0_.employee_id   AS employee_id8
  FROM sales s0_
 INNER JOIN employees e1_
         ON s0_.subsidiary_id = e1_.subsidiary_id
        AND s0_.employee_id   = e1_.employee_id
 WHERE s0_.sale_date &gt; ?</code></pre>
      </figure>

      <p>The returned objects are compatible with fully loaded objects, but the missing columns remain uninitialized. Accessing them does <i>not</i> trigger an exception.</p>

      <aside class="sidebar-note">
        <h3>Warning</h3>
        <p>MySQL does not support hash joins at all (feature request #59025)</p>
