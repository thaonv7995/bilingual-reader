      <p class="chapter-running-head">Chapter 4: The Join Operation</p>

      <p class="operation-label">Perl</p>
      <p class="code-intro">The following sample demonstrates Perl&rsquo;s DBIx::Class framework:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code>my @employees =
   $schema-&gt;resultset('Employees')
          -&gt;search({'UPPER(last_name)' =&gt; {-like=&gt;'WIN%'}});</code></pre>
      </figure>
      <figure class="code-snippet">
        <pre class="code-block"><code>foreach my $employee (@employees) {
   # process Employee
   foreach my $sale ($employee-&gt;sales) {
      # process Sale for Employee
   }
}</code></pre>
      </figure>

      <p class="code-intro">DBIx::Class 0.08192 generates N+1 select queries:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code>SELECT me.employee_id, me.subsidiary_id
     , me.last_name, me.first_name, me.date_of_birth
  FROM employees me
 WHERE ( UPPER(last_name) LIKE ? )</code></pre>
      </figure>
      <figure class="code-snippet">
        <pre class="code-block"><code>   SELECT me.sale_id, me.employee_id, me.subsidiary_id
        , me.sale_date, me.eur_value
     FROM sales me
    WHERE ( ( me.employee_id = ?
      AND me.subsidiary_id = ? ) )</code></pre>
      </figure>
      <figure class="code-snippet">
        <pre class="code-block"><code>   SELECT me.sale_id, me.employee_id, me.subsidiary_id
        , me.sale_date, me.eur_value
     FROM sales me
    WHERE ( ( me.employee_id = ?
      AND me.subsidiary_id = ? ) )</code></pre>
      </figure>

      <p class="operation-label">PHP</p>
      <p class="code-intro">The Doctrine sample uses the query builder interface:</p>
      <figure class="code-snippet">
        <pre class="code-block"><code>$qb = $em-&gt;createQueryBuilder();
$qb-&gt;select('e')
   -&gt;from('Employees', 'e')
   -&gt;where("upper(e.last_name) like :last_name")
   -&gt;setParameter('last_name', 'WIN%');
$r = $qb-&gt;getQuery()-&gt;getResult();</code></pre>
      </figure>
      <figure class="code-snippet">
        <pre class="code-block"><code>foreach ($r as $row) {
   // process Employee
   foreach ($row-&gt;getSales() as $sale) {
      // process Sale for Employee
   }
}</code></pre>
      </figure>
