<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQL Performance Explained — Cover</title>
  <link rel="stylesheet" href="../assets/book.css">
  <link rel="stylesheet" href="../assets/page-tokens.css">
  <link rel="stylesheet" href="../assets/figures-page.css">
  <style>
    .cover {
      position: relative;
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #fff;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
      color: #005db4;
    }

    .cover__ribbon {
      position: absolute;
      top: 0;
      right: 0;
      width: 39%;
      z-index: 2;
    }

    .cover__ribbon img {
      display: block;
      width: 100%;
      height: auto;
    }

    .cover__title-block {
      position: absolute;
      left: 7.3%;
      top: 7.7%;
      width: 87.3%;
      z-index: 1;
    }

    .cover__title-line {
      margin: 0;
      font-size: 54pt;
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.01em;
      color: #005db4;
    }

    .cover__title-line--performance {
      font-weight: 400;
    }

    .cover__explained-bar {
      display: flex;
      align-items: center;
      margin-top: 0.5mm;
      width: 100%;
      height: 14.5mm;
      background: #005db4;
    }

    .cover__explained {
      padding-left: 16%;
      font-size: 50pt;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      color: #fff;
      text-transform: uppercase;
    }

    .cover__orange-rule {
      width: 100%;
      height: 1.1mm;
      background: #f39200;
    }

    .cover__edition {
      position: absolute;
      right: 12.7%;
      top: 35.4%;
      margin: 0;
      font-size: 12pt;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #005db4;
    }

    .cover__photo {
      position: absolute;
      left: 0;
      top: 46.8%;
      width: 100%;
      margin: 0;
      padding: 0;
      line-height: 0;
    }

    .cover__photo img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
    }

    .cover__tagline-bar {
      position: absolute;
      left: 0;
      top: 78.3%;
      width: 100%;
      height: 8.7%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #005db4;
      padding: 0 8mm;
      box-sizing: border-box;
    }

    .cover__tagline-bar p {
      margin: 0;
      font-size: 11.9pt;
      font-weight: 400;
      line-height: 1.2;
      letter-spacing: 0.02em;
      text-align: center;
      text-transform: uppercase;
      color: #fff;
    }

    .cover__author {
      position: absolute;
      right: 8.4%;
      bottom: 10.2%;
      margin: 0;
      font-size: 12pt;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #005db4;
    }

    @media print {
      .book-page {
        height: 296mm;
      }
    }
  </style>
</head>
<body class="book-standalone">
  <main class="book-page book-page--sheet">
    <article class="cover">
      <div class="cover__ribbon">
        <img src="../assets/images/page_0001_ribbon.png" width="688" height="417" alt="Bao gồm tất cả các cơ sở dữ liệu SQL chính">
      </div>

      <header class="cover__title-block">
        <h1 class="cover__title-line">SQL</h1>
        <h1 class="cover__title-line cover__title-line--performance">HIỆU SUẤT</h1>
        <div class="cover__explained-bar">
          <span class="cover__explained">GIẢI THÍCH</span>
        </div>
        <div class="cover__orange-rule"></div>
      </header>

      <p class="cover__edition">BẢN TIẾNG ANH</p>

      <figure class="cover__photo">
        <img src="../assets/images/page_0001_cover_photo.png" width="890" height="433" alt="Con sóc chạy trên cỏ">
      </figure>

      <div class="cover__tagline-bar">
        <p>TẤT CẢ NHỮNG GÌ CÁC NHÀ PHÁT TRIỂN CẦN BIẾT VỀ HIỆU SUẤT SQL</p>
      </div>

      <p class="cover__author">MARKUS WINAND</p>
    </article>
  </main>
</body>
</html>
