  <main class="book-page book-page--sheet">

      <header class="running-head">

        <span class="rh-right">69</span>
      </header>
      <p class="chapter-running-head">Ràng buộc NOT NULL</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>SELECT *
  FROM employees
 WHERE date_of_birth IS NULL;</code></pre>
      </figure>

      <figure class="code-snippet">
        <pre class="code-block"><code>-------------------------------------------------------------
|Id |Operation                   | Name       | Rows | Cost |
-------------------------------------------------------------
| 0 |SELECT STATEMENT            |            |    1 |    3 |
| 1 | TABLE ACCESS BY INDEX ROWID| EMPLOYEES  |    1 |    3 |
|*2 |  INDEX RANGE SCAN          | EMP_DOB_BB |    1 |    2 |
-------------------------------------------------------------</code></pre>
      </figure>

      <p class="no-indent">Cơ sở dữ liệu Oracle biết rằng một số hàm nội bộ chỉ trả về <code>NULL</code> nếu <code>NULL</code> được cung cấp làm đầu vào.</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>DROP INDEX emp_dob_bb;
CREATE INDEX emp_dob_upname
    ON employees (date_of_birth, upper(last_name));</code></pre>
      </figure>

      <figure class="code-snippet">
        <pre class="code-block"><code>SELECT *
  FROM employees
 WHERE date_of_birth IS NULL;</code></pre>
      </figure>

      <figure class="code-snippet">
        <pre class="code-block"><code>----------------------------------------------------------
|Id |Operation                   | Name           | Cost |
----------------------------------------------------------
| 0 |SELECT STATEMENT            |                |    3 |
| 1 | TABLE ACCESS BY INDEX ROWID| EMPLOYEES      |    3 |
|*2 |  INDEX RANGE SCAN          | EMP_DOB_UPNAME |    2 |
----------------------------------------------------------</code></pre>
      </figure>

      <p class="no-indent">Hàm <code>UPPER</code> giữ nguyên thuộc tính <code>NOT NULL</code> của cột <code>LAST_NAME</code>. Tuy nhiên, việc loại bỏ ràng buộc sẽ làm cho chỉ mục không thể sử dụng:</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>ALTER TABLE employees MODIFY last_name NULL;

SELECT *
  FROM employees
 WHERE date_of_birth IS NULL;</code></pre>
      </figure>

      <figure class="code-snippet">
        <pre class="code-block"><code>----------------------------------------------------
| Id | Operation         | Name      | Rows | Cost |
----------------------------------------------------
|  0 | SELECT STATEMENT  |           |    1 |  477 |
|* 1 |  TABLE ACCESS FULL| EMPLOYEES |    1 |  477 |
----------------------------------------------------</code></pre>
      </figure>
