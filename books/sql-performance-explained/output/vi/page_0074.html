      <p class="chapter-running-head">Chương 2: Câu Lệnh Where</p>

      <p class="operation-label">MySQL</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>CREATE FUNCTION quarter_begin(dt DATETIME)
RETURNS DATETIME DETERMINISTIC
RETURN CONVERT
       (
         CONCAT
         ( CONVERT(YEAR(dt),CHAR(4))
         , '-'
         , CONVERT(QUARTER(dt)*3-2,CHAR(2))
         , '-01'
         )
       , datetime
       );</code></pre>
      </figure>

      <figure class="code-snippet">
        <pre class="code-block"><code>CREATE FUNCTION quarter_end(dt DATETIME)
RETURNS DATETIME DETERMINISTIC
RETURN DATE_ADD
       ( DATE_ADD ( quarter_begin(dt), INTERVAL 3 MONTH )
       , INTERVAL -1 MICROSECOND);</code></pre>
      </figure>

      <p class="operation-label">Oracle Database</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>CREATE FUNCTION quarter_begin(dt IN DATE)
RETURN DATE
AS
BEGIN
   RETURN TRUNC(dt, 'Q');
END;
/</code></pre>
      </figure>

      <figure class="code-snippet">
        <pre class="code-block"><code>CREATE FUNCTION quarter_end(dt IN DATE)
RETURN DATE
AS
BEGIN
   -- kiểu DATE của Oracle có độ phân giải giây
   -- trừ một giây từ ngày đầu tiên
   -- của quý tiếp theo
   RETURN TRUNC(ADD_MONTHS(dt, +3), 'Q')
        - (1/(24*60*60));
END;
/</code></pre>
