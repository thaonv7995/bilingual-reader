      <p class="no-indent">The following are examples of valid functional interfaces:</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>@FunctionalInterface
interface Mover1{
  void move(int x, int y);
}
@FunctionalInterface
interface Mover2{
  void move(int x, int y);
  default void no_op(){ System.out.println("do nothing"); }
}</code></pre>
      </figure>

      <p class="no-indent">And the following are examples of invalid functional interfaces:</p>

      <figure class="code-snippet code-snippet--error">
        <pre class="code-block"><code>@FunctionalInterface //valid interface but not a valid functional interface
interface Mover3{ //because it has two abstract methods
  void move(int x, int y);
  void move3D(int x, int y, int z);
}
@FunctionalInterface //valid interface but not a valid functional interface
interface Mover4{ //because it has no abstract method
  default void move(int x, int y){
    System.out.println("moving "+x+" "+y);
  }
}
@FunctionalInterface //valid interface but not a valid functional interface
//NewMover has two abstract methods including the one that it inherits from Mover2
interface NewMover extends Mover2{
  void m2(String str);
}</code></pre>
      </figure>
