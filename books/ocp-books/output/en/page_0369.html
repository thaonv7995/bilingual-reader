      <h3 class="section-title">18.4 Quiz<span class="section-icon" aria-hidden="true">☝</span></h3>

      <p class="no-indent"><strong>Q1.</strong> What will the following code print?</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>List&lt;String&gt; names = new ArrayList(List.of("a", "b", "c", "d", "e"));
Spliterator&lt;String&gt; split1 = names.spliterator();
System.out.print(split1.hasCharacteristics(Spliterator.SIZED));
System.out.println(" "+split1.estimateSize());
Spliterator&lt;String&gt; split2 = split1.trySplit();
while(split1.tryAdvance((value) -&gt; System.out.print(value))){ };
System.out.println("");
split2.forEachRemaining(System.out::print);</code></pre>
      </figure>

      <p class="no-indent">Select <strong>1</strong> correct option.</p>
