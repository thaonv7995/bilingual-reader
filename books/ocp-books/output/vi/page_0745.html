      <p class="no-indent">Kết quả đầu ra của đoạn mã sau sẽ là gì?</p>

      <figure class="code-snippet">
        <pre class="code-block"><code>ResourceBundle rb1 = ResourceBundle.getBundle("msgs");
System.out.println(rb1.getString("Hi")); //1
ResourceBundle rb2 = ResourceBundle.getBundle("msgs", Locale.of("es", "MX"));
System.out.println(rb2.getString("Hi")); //2
ResourceBundle rb3 = ResourceBundle.getBundle("msgs", Locale.of("MX"));
System.out.println(rb3.getString("Hi")); //3
ResourceBundle rb4 = ResourceBundle.getBundle("msgs", Locale.of("hi", "IN"));
System.out.println(rb4.getString("Hi")); //4
ResourceBundle rb5 = ResourceBundle.getBundle("msgs", Locale.of("US"));
System.out.println(rb5.getString("Regards")); //5
ResourceBundle rb6 = ResourceBundle.getBundle("msgs", Locale.of("MX"));
System.out.println(rb6.getString("Regards")); //6
ResourceBundle rb7 = ResourceBundle.getBundle("msgs", Locale.of("es", "MX"));
System.out.println(rb7.getString("Regards")); //7</code></pre>
