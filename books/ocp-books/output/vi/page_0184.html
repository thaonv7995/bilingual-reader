      <figure class="code-snippet">
        <pre class="code-block"><code>    public double computeSimpleInterest(double p, double r, double t)
    {
        if( t&lt;0) throw new IllegalArgumentException("time is less than 0");
        return p*r*t/100;
    }

    public void doInterest(){
        try{
            double interest = computeSimpleInterest(1000.0, 10.0, -1);
            System.out.println("Computed interest "+interest);
        }catch(IllegalArgumentException iae){
            System.out.println("Problem in computing interest:"+iae.getMessage());
            iae.printStackTrace();
        }finally{
            System.out.println("all done");
        }
    }
}</code></pre>
