<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animal Farm — Page 1</title>
  <link rel="stylesheet" href="../assets/book.css">
  <link rel="stylesheet" href="../assets/page-tokens.css">
  <link rel="stylesheet" href="../assets/prose-page.css">
  <style>
    @media print {
      .book-page { height: 296mm; }
    }
    
    /* Title page specific layout to match PDF */
    .title-page-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    
    .title-page-border {
      position: absolute;
      left: 25.4mm;
      top: 27.7mm;
      width: 159.2mm;
      height: 239.8mm;
      border: 0.5mm solid #00609c;
      box-sizing: border-box;
      transition: border-color 0.5s ease, box-shadow 0.5s ease;
    }
    
    .title-page-border:hover {
      border-color: var(--book-accent, #1e4088);
      box-shadow: inset 0 0 10px rgba(30, 64, 136, 0.05);
    }
    
    .title-page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      animation: titleFadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes titleFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .title-book {
      font-family: Georgia, serif;
      font-size: 28.8pt;
      font-weight: normal;
      letter-spacing: 0.05em;
      color: var(--book-ink, #111111);
      margin-top: 4.8mm;
      margin-bottom: 0;
      line-height: 1;
      text-align: center;
    }
    
    .title-separator {
      width: 49.5mm;
      height: 2px;
      border-top: 0.72pt solid #898989;
      border-bottom: 0.72pt solid #dddddd;
      margin-top: 13.5mm;
      margin-bottom: 12.1mm;
      position: relative;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.5s ease;
    }
    
    .title-page-border:hover .title-separator {
      width: 60mm;
      border-top-color: var(--book-accent, #1e4088);
    }
    
    /* Small vertical end-caps/ticks on the separator line */
    .title-separator::before,
    .title-separator::after {
      content: '';
      position: absolute;
      top: -1px;
      width: 0.72pt;
      height: 3.5pt;
      background: #000000;
      transition: background-color 0.5s ease;
    }
    .title-separator::before {
      left: 0;
    }
    .title-separator::after {
      right: 0;
    }
    
    .title-page-border:hover .title-separator::before,
    .title-page-border:hover .title-separator::after {
      background-color: var(--book-accent, #1e4088);
    }
    
    .title-author {
      font-family: Georgia, serif;
      font-size: 28.8pt;
      font-weight: normal;
      color: var(--book-ink, #111111);
      margin-top: 0;
      margin-bottom: 0;
      line-height: 1;
      text-align: center;
    }
  </style>
</head>
<body class="book-standalone">
  <nav class="page-nav" aria-label="Page navigation">
    <span>Page 1 / 108</span>
    <a href="page_0002.html">Next →</a>
  </nav>
  <main class="book-page book-page--sheet">
    <article class="sheet-flow prose-page">
      <div class="title-page-container">
        <div class="title-page-border">
          <div class="title-page-content">
            <h1 class="title-book">ANIMAL FARM</h1>
            <div class="title-separator"></div>
            <div class="title-author">George Orwell</div>
          </div>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
